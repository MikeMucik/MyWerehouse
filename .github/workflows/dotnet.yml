name: .NET build and tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore MyWerehouse.sln

      - name: Build
        run: dotnet build MyWerehouse.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test MyWerehouse.sln --configuration Release --no-build